name: SQL Database Check

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  validate-sql:
    name: Validate clinicdesk_db SQL import
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: clinicdesk_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Verify SQL file exists
        run: |
          test -f database/clinicdesk_db.sql
          echo "SQL file found"

      - name: Import database schema
        run: |
          mysql -h 127.0.0.1 -uroot -proot clinicdesk_db < database/clinicdesk_db.sql

      - name: Verify required tables
        run: |
          mysql -h 127.0.0.1 -uroot -proot clinicdesk_db -e "SHOW TABLES;"
          mysql -h 127.0.0.1 -uroot -proot clinicdesk_db -e "DESCRIBE users;"
          mysql -h 127.0.0.1 -uroot -proot clinicdesk_db -e "DESCRIBE specializations;"
          mysql -h 127.0.0.1 -uroot -proot clinicdesk_db -e "DESCRIBE doctors;"
          mysql -h 127.0.0.1 -uroot -proot clinicdesk_db -e "DESCRIBE appointments;"
          mysql -h 127.0.0.1 -uroot -proot clinicdesk_db -e "DESCRIBE prescriptions;"

      - name: Verify seeded accounts
        run: |
          mysql -h 127.0.0.1 -uroot -proot clinicdesk_db -e "SELECT id, name, email, role FROM users;"
